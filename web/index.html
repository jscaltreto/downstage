<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Downstage Editor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="toolbar">
      <h1>Downstage</h1>
      <div class="toolbar-controls">
        <label for="style-select">Style:</label>
        <select id="style-select">
          <option value="standard">Standard</option>
          <option value="condensed">Condensed</option>
        </select>
        <button id="export-pdf" disabled>Export PDF</button>
      </div>
    </header>
    <div id="loading">Loading Downstage WASM module&hellip;</div>
    <main id="workspace" class="hidden">
      <div id="editor-pane"></div>
      <div id="preview-pane">
        <iframe id="preview" sandbox="allow-same-origin" title="Live preview"></iframe>
      </div>
    </main>
  </div>
  <script src="dist/wasm_exec.js"></script>
  <script type="module" src="dist/bundle.js"></script>
</body>
</html>
