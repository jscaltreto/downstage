name: CI

on:
  pull_request:
  push:
    branches:
      - main
  merge_group:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build and Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
          check-latest: true

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          distribution: goreleaser
          version: "~> v2"
          install-only: true

      - name: Download modules
        run: go mod download

      - name: Install site dependencies
        run: npm ci

      - name: Install web editor dependencies
        run: npm --prefix web ci

      - name: Run checks
        id: checks
        run: make check

      - name: Validate release config
        id: release-check
        run: make release-check

      - name: Build binary
        id: build
        run: make

      - name: Build WASM
        id: wasm
        run: GOOS=js GOARCH=wasm go build -o /dev/null ./cmd/wasm/

      - name: Run web editor tests
        id: web-test
        run: npm --prefix web test

      - name: Build site
        id: site
        env:
          RELEASE_VERSION: ci
        run: npm run build:site

      - name: Job summary
        if: always()
        run: |
          echo "## CI Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Step | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Checks | \`${{ steps.checks.outcome }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Release config | \`${{ steps.release-check.outcome }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build  | \`${{ steps.build.outcome }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| WASM   | \`${{ steps.wasm.outcome }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Web tests | \`${{ steps.web-test.outcome }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Site   | \`${{ steps.site.outcome }}\` |" >> "$GITHUB_STEP_SUMMARY"

  web-e2e:
    name: Web E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
          check-latest: true

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web editor dependencies
        run: npm --prefix web ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('web/package-lock.json') }}

      - name: Install Playwright browsers
        run: npx --prefix web playwright install --with-deps chromium

      - name: Build WASM
        run: make wasm

      - name: Build web bundle
        run: npm --prefix web run build

      - name: Run Playwright tests
        run: npm --prefix web run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 14

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: web/test-results/
          retention-days: 14
