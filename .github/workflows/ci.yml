name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build and Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true
          check-latest: true

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          distribution: goreleaser
          version: "~> v2"
          install-only: true

      - name: Download modules
        run: go mod download

      - name: Install site dependencies
        run: npm ci

      - name: Install web editor dependencies
        run: npm --prefix web ci

      - name: Run checks
        id: checks
        run: make check

      - name: Validate release config
        id: release-check
        run: make release-check

      - name: Build binary
        id: build
        run: make

      - name: Build WASM
        id: wasm
        run: GOOS=js GOARCH=wasm go build -o /dev/null ./cmd/wasm/

      - name: Build site
        id: site
        env:
          RELEASE_VERSION: ci
        run: npm run build:site

      - name: Job summary
        if: always()
        run: |
          echo "## CI Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Step | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Checks | \`${{ steps.checks.outcome }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Release config | \`${{ steps.release-check.outcome }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build  | \`${{ steps.build.outcome }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| WASM   | \`${{ steps.wasm.outcome }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Site   | \`${{ steps.site.outcome }}\` |" >> "$GITHUB_STEP_SUMMARY"
