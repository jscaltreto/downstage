name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true
          check-latest: true

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload GoReleaser dist
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: goreleaser-dist
          path: dist
          if-no-files-found: error

      - name: Check out Homebrew tap
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: jscaltreto/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Update Homebrew formula
        run: python3 scripts/update_homebrew_formula.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
          FORMULA_PATH: homebrew-tap/Formula/downstage.rb

      - name: Commit Homebrew formula update
        run: |
          cd homebrew-tap
          if git diff --quiet; then
            echo "No Homebrew formula changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/downstage.rb
          git commit -m "chore(formula): update downstage to ${GITHUB_REF_NAME}"
          git push origin HEAD:main

  vscode-vsix:
    name: Package VSIX
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: goreleaser
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download GoReleaser dist
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: goreleaser-dist
          path: dist

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install VS Code extension dependencies
        working-directory: editors/vscode
        run: npm ci

      - name: Compile VS Code extension
        working-directory: editors/vscode
        run: npm run compile

      - name: Package platform VSIX artifacts
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          version="${RELEASE_VERSION#v}"
          targets=(
            "linux-x64 linux amd64"
            "darwin-x64 darwin amd64"
            "darwin-arm64 darwin arm64"
            "win32-x64 windows amd64"
          )

          for entry in "${targets[@]}"; do
            set -- ${entry}
            target="$1"
            goos="$2"
            goarch="$3"
            binary_path="$(jq -r --arg goos "${goos}" --arg goarch "${goarch}" '
              .. | objects | select(.type? == "Binary" and .goos? == $goos and .goarch? == $goarch) | .path
            ' dist/artifacts.json | head -n 1)"

            if [ -z "${binary_path}" ] || [ "${binary_path}" = "null" ]; then
              echo "Missing GoReleaser binary for ${target}" >&2
              exit 1
            fi

            npm --prefix editors/vscode run package -- --skip-compile --target "${target}" --binary "${binary_path}" --version "${version}"
          done

      - name: Upload VSIX artifacts
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: vscode-vsix
          path: editors/vscode/downstage-vscode-*.vsix
          if-no-files-found: error

  upload-vsix:
    name: Upload VSIX Assets
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - goreleaser
      - vscode-vsix
    permissions:
      contents: write

    steps:
      - name: Download VSIX artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: vscode-vsix
          path: editors/vscode

      - name: Upload VSIX release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          version="${RELEASE_VERSION#v}"
          gh release upload "${GITHUB_REF_NAME}" \
            "editors/vscode/downstage-vscode-${version}-linux-x64.vsix" \
            "editors/vscode/downstage-vscode-${version}-darwin-x64.vsix" \
            "editors/vscode/downstage-vscode-${version}-darwin-arm64.vsix" \
            "editors/vscode/downstage-vscode-${version}-win32-x64.vsix" \
            --clobber
