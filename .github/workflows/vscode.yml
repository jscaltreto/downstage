name: VS Code Extension

on:
  pull_request:
    paths:
      - ".github/workflows/vscode.yml"
      - "CHANGELOG.md"
      - "editors/vscode/**"
      - "LICENSE"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/vscode.yml"
      - "CHANGELOG.md"
      - "editors/vscode/**"
      - "LICENSE"

permissions:
  contents: read

concurrency:
  group: vscode-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint, Compile, and Package Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: editors/vscode

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Compile
        run: npm run compile

      - name: Package smoke tests
        run: |
          npm run package -- --skip-compile --target linux-x64 --binary CHANGELOG.md
          npm run package -- --skip-compile --target darwin-x64 --binary CHANGELOG.md --version 0.0.1-ci1
          npm run package -- --skip-compile --target darwin-arm64 --binary CHANGELOG.md --version 0.0.1-ci2
          npm run package -- --skip-compile --target win32-x64 --binary CHANGELOG.md --version 0.0.1-ci3
